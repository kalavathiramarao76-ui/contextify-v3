name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Create google-services.json
        run: |
          cat > android/app/google-services.json << 'EOFGS'
          {
            "project_info": {
              "project_number": "967175964103",
              "project_id": "app1-99b5a",
              "storage_bucket": "app1-99b5a.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:967175964103:android:contextify",
                  "android_client_info": {
                    "package_name": "com.contextify.contextify_mobile"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyA8_NLsIU-daIZpNmuuAHGDI0ihDrBDqnM"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOFGS

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle (for Play Store)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contextify-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB (App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: contextify-aab
          path: build/app/outputs/bundle/release/app-release.aab
